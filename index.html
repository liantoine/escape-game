<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_HACKER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #terminal { border: 1px solid #0f0; padding: 30px; background: rgba(0, 10, 0, 0.95); box-shadow: 0 0 20px #0f0; width: 650px; text-align: center; z-index: 1; }
        
        /* Style pour l'affichage de la matrice */
        .matrix-display {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            font-size: 1.2em;
            position: relative;
            padding: 0 15px;
        }
        .matrix-display::before, .matrix-display::after {
            content: ""; position: absolute; top: 0; bottom: 0; width: 10px; border: 2px solid #0f0;
        }
        .matrix-display::before { left: 0; border-right: none; }
        .matrix-display::after { right: 0; border-left: none; }
        .matrix-row { display: flex; justify-content: center; }
        .matrix-cell { padding: 5px 10px; min-width: 30px; }

        pre { white-space: pre-wrap; color: #8f8; font-size: 1em; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 200px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #message { margin-top: 20px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <div id="terminal">
        <h2 id="etape-titre">ACCÈS...</h2>
        <p id="question-texte"></p>
        <div id="matrix-container"></div>
        <pre id="options-texte"></pre>
        <div id="input-zone">
            <input type="text" id="reponse-input" placeholder="CODE" autocomplete="off">
            <button onclick="verifier()">EXEC</button>
        </div>
        <div id="message"></div>
    </div>

    <script>
        // Animation Matrix
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = "0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0'; ctx.font = fontSize + 'px monospace';
            rainDrops.forEach((y, i) => {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, y * fontSize);
                if(y * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            });
        };
        setInterval(draw, 30);
    </script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
